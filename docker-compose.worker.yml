version: "3.9"
# ─── WORKER (remote machine, e.g. powerhorse) ────────────────────────────────
# Runs AFL++ secondary instances only.
# Sync agent pulls main/queue from controller and pushes discoveries back.
#
# Usage on remote machine (powerhorse):
#   CONTROLLER_URL=http://<controller_ip>:56789 \
#   WORKER_NAME=ph \
#   AFL_CORES=28 \
#   docker-compose -f docker-compose.worker.yml up --build
#
# Or with env file:
#   docker-compose -f docker-compose.worker.yml --env-file worker.env up --build

services:
  # ─── Dashboard sidecar (local stats only) ───────────────────────────────────
  dashboard:
    build:
      context: .
      dockerfile: docker/Dockerfile.dashboard
    container_name: isobmff-dashboard-worker
    ports:
      - "56789:56789"
    volumes:
      - ./results:/results
      - ./dashboard/static:/dashboard/static
    environment:
      - DB_PATH=/results/fuzzer.db
      - RESULTS_DIR=/results
      - AFL_SYNC_DIR=/results/afl_sync
      - MACHINE_NAME=${WORKER_NAME:-worker}
      - REMOTE_MACHINES=      # workers don't aggregate other machines
      - DASHBOARD_PASSWORD=${DASHBOARD_PASSWORD:-helloworld}
      - SECRET_KEY=${SECRET_KEY:-fuzzer-secret-key-change-me}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:56789/api/stats"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ─── AFL++ worker instances + sync agent ────────────────────────────────────
  fuzzer:
    build:
      context: .
      dockerfile: docker/Dockerfile.fuzzer
    container_name: isobmff-fuzzer-worker
    volumes:
      - ./results:/results
      - ./fuzzer/corpus:/fuzzer/corpus
      - ./scripts:/scripts:ro
    environment:
      - DASHBOARD_API=http://dashboard:56789
      - AFL_SYNC_DIR=/results/afl_sync
      - CONTROLLER_URL=${CONTROLLER_URL}          # REQUIRED: controller dashboard URL
      - WORKER_NAME=${WORKER_NAME:-worker}         # unique name for this machine
      - MAX_TOTAL_TIME=${FUZZ_TIME:-0}
      - AFL_CORES=${AFL_CORES:-1}
      - AFL_NO_AFFINITY=1
      - AFL_SKIP_CPUFREQ=1
      - AFL_AUTORESUME=1
      - AFL_IMPORT_FIRST=1
      - SYNC_INTERVAL=${SYNC_INTERVAL:-30}
      - DASHBOARD_PASSWORD=${DASHBOARD_PASSWORD:-helloworld}
      - ASAN_OPTIONS=halt_on_error=0:abort_on_error=0:detect_leaks=0:allocator_may_return_null=1
      - UBSAN_OPTIONS=halt_on_error=0:print_stacktrace=1
    depends_on:
      dashboard:
        condition: service_healthy
    entrypoint: |
      /bin/bash -c "
        echo core > /proc/sys/kernel/core_pattern 2>/dev/null || true
        echo 0    > /proc/sys/kernel/randomize_va_space 2>/dev/null || true
        while true; do
          /scripts/run_worker.sh
          echo '[*] Worker run complete. Sleeping 5s...'
          sleep 5
        done
      "
    restart: unless-stopped
    security_opt:
      - seccomp:unconfined
    cap_add:
      - SYS_PTRACE
      - SYS_ADMIN
    shm_size: "256mb"
    ulimits:
      core: 0
      nofile:
        soft: 65536
        hard: 65536

volumes:
  results:
