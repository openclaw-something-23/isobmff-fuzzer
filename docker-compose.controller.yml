version: "3.9"
# ─── CONTROLLER (this machine) ───────────────────────────────────────────────
# Runs AFL++ main instance + local secondaries.
# Remote workers connect to this machine's dashboard and sync corpus via HTTP.
#
# Usage:
#   docker-compose -f docker-compose.controller.yml up --build
#
# Scale local cores (e.g. 4 total):
#   AFL_CORES=4 docker-compose -f docker-compose.controller.yml up --build

services:
  # ─── Dashboard (controller) ─────────────────────────────────────────────────
  dashboard:
    build:
      context: .
      dockerfile: docker/Dockerfile.dashboard
    container_name: isobmff-dashboard
    ports:
      - "56789:56789"
    volumes:
      - ./results:/results
      - ./dashboard/static:/dashboard/static   # hot-reload UI
    environment:
      - DB_PATH=/results/fuzzer.db
      - RESULTS_DIR=/results
      - AFL_SYNC_DIR=/results/afl_sync
      - MACHINE_NAME=controller
      # Remote machines to aggregate in the dashboard
      # Format: "label:url:password,..."
      - REMOTE_MACHINES=${REMOTE_MACHINES:-powerhorse:http://16.16.169.131:56789:helloworld}
      - DASHBOARD_PASSWORD=${DASHBOARD_PASSWORD:-helloworld}
      - SECRET_KEY=${SECRET_KEY:-fuzzer-secret-key-change-me}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:56789/api/stats"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ─── AFL++ controller (main + local secondaries) ────────────────────────────
  fuzzer:
    build:
      context: .
      dockerfile: docker/Dockerfile.fuzzer
    container_name: isobmff-fuzzer
    volumes:
      - ./results:/results
      - ./fuzzer/corpus:/fuzzer/corpus
      - ./scripts:/scripts:ro
    environment:
      - DASHBOARD_API=http://dashboard:56789
      - AFL_SYNC_DIR=/results/afl_sync
      - MAX_TOTAL_TIME=${FUZZ_TIME:-0}     # 0 = run forever (restart on crash only)
      - MAX_LEN=${MAX_LEN:-65536}
      - AFL_CORES=${AFL_CORES:-2}          # local cores only (main + N-1 secondaries)
      - AFL_NO_AFFINITY=1
      - AFL_SKIP_CPUFREQ=1
      - AFL_AUTORESUME=1
      - AFL_IMPORT_FIRST=1
      - ASAN_OPTIONS=halt_on_error=0:abort_on_error=0:detect_leaks=0:allocator_may_return_null=1
      - UBSAN_OPTIONS=halt_on_error=0:print_stacktrace=1
    depends_on:
      dashboard:
        condition: service_healthy
    entrypoint: |
      /bin/bash -c "
        echo core > /proc/sys/kernel/core_pattern 2>/dev/null || true
        echo 0    > /proc/sys/kernel/randomize_va_space 2>/dev/null || true
        while true; do
          /scripts/run_controller.sh
          echo '[*] Controller run complete. Sleeping 5s...'
          sleep 5
        done
      "
    restart: unless-stopped
    security_opt:
      - seccomp:unconfined
    cap_add:
      - SYS_PTRACE
      - SYS_ADMIN
    shm_size: "256mb"
    ulimits:
      core: 0
      nofile:
        soft: 65536
        hard: 65536

volumes:
  results:
