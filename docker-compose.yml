version: "3.9"

services:
  # ─── Dashboard ──────────────────────────────────────────────────
  dashboard:
    build:
      context: .
      dockerfile: docker/Dockerfile.dashboard
    container_name: isobmff-dashboard
    ports:
      - "56789:56789"
    volumes:
      - ./results:/results
      - ./dashboard/static:/dashboard/static   # hot-reload UI
    environment:
      - DB_PATH=/results/fuzzer.db
      - RESULTS_DIR=/results
      - MACHINE_NAME=local
      - REMOTE_MACHINES=powerhorse:http://16.16.169.131:56789:helloworld
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:56789/api/stats"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ─── Fuzzer (AFL++) ─────────────────────────────────────────────
  # Scale: docker-compose up --scale fuzzer=4
  fuzzer:
    build:
      context: .
      dockerfile: docker/Dockerfile.fuzzer
    container_name: isobmff-fuzzer
    volumes:
      - ./results:/results
      - ./fuzzer/corpus:/fuzzer/corpus      # shared seed corpus (rw)
    environment:
      - DASHBOARD_API=http://dashboard:56789
      - MAX_TOTAL_TIME=${FUZZ_TIME:-300}    # -V seconds per afl-fuzz run
      - MAX_LEN=${MAX_LEN:-65536}           # -g max input length
      - AFL_CORES=${AFL_CORES:-1}
      - AFL_NO_AFFINITY=1
      - AFL_SKIP_CPUFREQ=1
      - AFL_AUTORESUME=1
      # ASAN options: no halt on OOM, allow null returns
      - ASAN_OPTIONS=halt_on_error=0:abort_on_error=0:detect_leaks=0:allocator_may_return_null=1
      - UBSAN_OPTIONS=halt_on_error=0:print_stacktrace=1
    depends_on:
      dashboard:
        condition: service_healthy
    entrypoint: |
      /bin/bash -c "
        echo core > /proc/sys/kernel/core_pattern 2>/dev/null || true
        echo 0    > /proc/sys/kernel/randomize_va_space 2>/dev/null || true
        while true; do
          /scripts/run_fuzzer.sh
          echo '[*] Run complete. Sleeping 5s...'
          sleep 5
        done
      "
    restart: unless-stopped
    # AFL++ requires: seccomp off + SYS_PTRACE for ASAN stack traces
    security_opt:
      - seccomp:unconfined
    cap_add:
      - SYS_PTRACE
      - SYS_ADMIN          # needed for /proc/sys writes (core_pattern, ASLR)
    # Large /dev/shm for AFL++ persistent mode shared memory
    shm_size: "256mb"
    ulimits:
      core: 0
      nofile:
        soft: 65536
        hard: 65536

volumes:
  results:
