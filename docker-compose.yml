version: "3.9"
# ─── DEFAULT: CONTROLLER mode ────────────────────────────────────────────────
# This is the main docker-compose for the controller machine.
# For remote workers, use: docker-compose -f docker-compose.worker.yml
#
# Quick start:
#   docker-compose up --build
#
# Scale local cores:
#   AFL_CORES=4 docker-compose up --build

services:
  # ─── Dashboard ──────────────────────────────────────────────────
  dashboard:
    build:
      context: .
      dockerfile: docker/Dockerfile.dashboard
    container_name: isobmff-dashboard
    ports:
      - "56789:56789"
    volumes:
      - ./results:/results
      - ./dashboard/static:/dashboard/static   # hot-reload UI
    environment:
      - DB_PATH=/results/fuzzer.db
      - RESULTS_DIR=/results
      - AFL_SYNC_DIR=/results/afl_sync
      - MACHINE_NAME=controller
      - REMOTE_MACHINES=powerhorse:http://16.16.169.131:56789:helloworld
      - DASHBOARD_PASSWORD=${DASHBOARD_PASSWORD:-helloworld}
      - SECRET_KEY=${SECRET_KEY:-fuzzer-secret-key-change-me}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:56789/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ─── Fuzzer (AFL++ controller) ──────────────────────────────────
  fuzzer:
    build:
      context: .
      dockerfile: docker/Dockerfile.fuzzer
    container_name: isobmff-fuzzer
    volumes:
      - ./results:/results
      - ./fuzzer/corpus:/fuzzer/corpus
      - ./scripts:/scripts:ro
    environment:
      - DASHBOARD_API=http://dashboard:56789
      - AFL_SYNC_DIR=/results/afl_sync
      - MAX_TOTAL_TIME=${FUZZ_TIME:-0}     # 0 = run forever
      - MAX_LEN=${MAX_LEN:-65536}
      - AFL_CORES=${AFL_CORES:-2}
      - AFL_NO_AFFINITY=1
      - AFL_SKIP_CPUFREQ=1
      - AFL_AUTORESUME=1
      - AFL_IMPORT_FIRST=1
      - ASAN_OPTIONS=halt_on_error=0:abort_on_error=0:detect_leaks=0:allocator_may_return_null=1
      - UBSAN_OPTIONS=halt_on_error=0:print_stacktrace=1
    depends_on:
      dashboard:
        condition: service_healthy
    entrypoint: |
      /bin/bash -c "
        echo core > /proc/sys/kernel/core_pattern 2>/dev/null || true
        echo 0    > /proc/sys/kernel/randomize_va_space 2>/dev/null || true
        python3 /scripts/gen_structured_seeds.py /results/seeds_ok 2>/dev/null || true
        bash /scripts/generate_corpus.sh > /results/mp4gen.log 2>&1 &
        while true; do
          /scripts/run_controller.sh
          echo '[*] Run complete. Sleeping 5s...'
          sleep 5
        done
      "
    restart: unless-stopped
    security_opt:
      - seccomp:unconfined
    cap_add:
      - SYS_PTRACE
      - SYS_ADMIN
    shm_size: "256mb"
    ulimits:
      core: 0
      nofile:
        soft: 65536
        hard: 65536

volumes:
  results:
