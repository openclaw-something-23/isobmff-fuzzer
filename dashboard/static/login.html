<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🐛 ISOBMFF Fuzzer — Login</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 40px 44px;
      width: 360px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    .logo { font-size: 2.4rem; text-align: center; margin-bottom: 8px; }
    h1 { text-align: center; font-size: 1.1rem; font-weight: 600; color: #e6edf3; margin-bottom: 6px; }
    .sub { text-align: center; font-size: 0.8rem; color: #7d8590; margin-bottom: 28px; }
    label { display: block; font-size: 0.82rem; color: #7d8590; margin-bottom: 6px; }
    input[type="password"] {
      width: 100%;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #e6edf3;
      padding: 10px 14px;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="password"]:focus { border-color: #58a6ff; }
    button {
      width: 100%;
      margin-top: 18px;
      background: #1f6feb;
      border: none;
      border-radius: 6px;
      color: #fff;
      padding: 11px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #388bfd; }
    .error {
      margin-top: 14px;
      background: #3d1a1a;
      border: 1px solid #f85149;
      border-radius: 6px;
      color: #f85149;
      padding: 9px 14px;
      font-size: 0.82rem;
      display: none;
    }
    .error.show { display: block; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🐛</div>
    <h1>ISOBMFF Fuzzer</h1>
    <p class="sub">Dashboard — Restricted Access</p>
    <form id="form" onsubmit="doLogin(event)">
      <label>Password</label>
      <input type="password" id="pw" placeholder="Enter password" autofocus autocomplete="current-password" />
      <button type="submit">Sign in →</button>
      <div class="error" id="err">Incorrect password. Try again.</div>
    </form>
  </div>
  <script>
    async function doLogin(e) {
      e.preventDefault();
      const pw = document.getElementById('pw').value;
      const err = document.getElementById('err');
      err.classList.remove('show');
      const res = await fetch('/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: 'password=' + encodeURIComponent(pw)
      });
      if (res.ok) {
        window.location.href = '/';
      } else {
        err.classList.add('show');
        document.getElementById('pw').value = '';
        document.getElementById('pw').focus();
      }
    }
  </script>
</body>
</html>
